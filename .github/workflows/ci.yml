name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage gate
        env:
          # Tests must not depend on real credentials.
          ALPHA_PROVIDER: deepseek
        # The --cov-fail-under threshold lives in pyproject.toml so
        # local `pytest --cov=alpha` honors the same gate as CI.
        run: pytest -q --tb=short --cov=alpha --cov-report=term --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  security-audit:
    # DEEP_SECURITY V3.3 #033: pip-audit detecta CVEs em dependencias
    # automaticamente. Antes deste step, a CVE-2026-45409 idna 3.11 (#005)
    # passou meses sem deteccao. Rodado em job separado para isolar
    # falhas de cobertura/lint vs falhas de seguranca de deps.
    name: Audit dependencies for CVEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit on lockfile
        # `--strict` falha o build em vulneraveis. `--requirement` audita
        # o lockfile exato que vai pra producao em vez de re-resolver deps.
        run: pip-audit --strict --requirement requirements.lock
