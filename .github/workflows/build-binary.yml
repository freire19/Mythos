# Build standalone binaries for Linux/macOS/Windows and attach them to
# the GitHub Release that release-please just created (Plano-v3 §4 Tier 2).
#
# Trigger: tags shaped `alpha-code-v*` — the same trigger as
# publish-pypi.yml. The two workflows run independently so a PyPI
# outage doesn't block the binary upload (and vice versa).
#
# Cross-platform notes:
#   - PyInstaller can't cross-compile; each binary must be built on
#     its target OS. Hence the matrix.
#   - The runner OS images come with Python pre-installed, but we pin
#     3.12 via setup-python for parity with the wheel build.
#   - Linux/macOS binaries are named `alpha` (no extension); Windows
#     produces `alpha.exe`. The rename step normalizes to
#     `alpha-{os}-{arch}{ext}` so all assets are distinguishable on
#     the GitHub Release page.
#
# Auth: GITHUB_TOKEN is automatic. No secrets to configure.

name: build-binary

on:
  push:
    tags:
      - 'alpha-code-v*'

permissions:
  contents: write   # for attaching assets to the release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: alpha-linux-x86_64
            binary_name: alpha
          - os: macos-latest
            asset_name: alpha-macos-arm64
            binary_name: alpha
          - os: windows-latest
            asset_name: alpha-windows-x86_64.exe
            binary_name: alpha.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package + binary build deps
        # Install runtime deps (so PyInstaller's import graph resolves
        # them) plus the [binary] extra (PyInstaller itself).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[binary]"

      - name: Build with PyInstaller
        run: pyinstaller alpha.spec --clean --noconfirm

      - name: Rename binary for release asset
        shell: bash
        run: |
          mv "dist/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"
          ls -la dist/

      - name: Smoke test binary
        # Only run the smoke test on non-Windows runners. On Windows the
        # PyInstaller output is a console subsystem .exe that needs an
        # actual console to print to; in headless CI the --help call
        # works but capturing exit code reliably across shells gets
        # finicky enough that the Linux/macOS check is sufficient
        # signal that the build is healthy.
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.asset_name }} --help

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          # The tag that triggered this run is already a release
          # (release-please creates the release at tag time).
          # action-gh-release matches by tag automatically.
          fail_on_unmatched_files: true
